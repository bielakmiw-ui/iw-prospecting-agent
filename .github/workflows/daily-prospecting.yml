name: Daily Prospecting Agent

on:
  # Automatic weekday schedule is paused while ZoomInfo auth is unresolved -
  # it was burning tokens/cost on runs that couldn't complete. Manual runs
  # via workflow_dispatch (the "Run workflow" button) still work.
  # To resume automatic runs, uncomment the schedule block below:
  # schedule:
  #   - cron: "0 11 * * 1-5"  # 6:00am CDT (UTC-5) on weekdays
  workflow_dispatch: {}

jobs:
  run-prospecting-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IW Prospecting Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOOMINFO_CLIENT_ID: ${{ secrets.ZOOMINFO_CLIENT_ID }}
          ZOOMINFO_CLIENT_SECRET: ${{ secrets.ZOOMINFO_CLIENT_SECRET }}
        run: python iw_prospecting_agent.py
